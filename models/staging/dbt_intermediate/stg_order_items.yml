version: 2

models:
  - name: stg_order_items
    description: Staging view of order items.
    columns:
      - name: order_line_id
        description: Composite key made of order_id and product_id
        tests:
          - unique
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - product_id