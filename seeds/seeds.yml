version: 2

seeds:
  - name: raw_marketing_events
    config:
      column_types:
        event_timestamp: timestamp
        event_id: integer
        customer_id: integer

  - name: raw_customers_extended
    config:
      column_types:
        customer_id: integer
        signup_date: date
        marketing_opt_in: boolean

  - name: raw_order_items
    config:
      column_types:
        order_id: integer
        product_id: integer
        quantity: integer
        unit_price_cents: numeric(10, 2)
